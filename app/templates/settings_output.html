<form method="post" action="/ebooks/{{ slug }}/settings/output" class="settings-form">

<details class="settings-group" open>
    <summary>Đường dẫn</summary>
    <div class="settings-grid cols-2">
        <label> data_dir
            <input type="text" name="data_dir" value="{{ cfg.output.data_dir }}"
                class="{% if not is_default(cfg.output.data_dir, 'output', 'data_dir') %}overridden{% endif %}">
            {% if is_default(cfg.output.data_dir, 'output', 'data_dir') %}
            <span class="default-hint">Mặc định: data</span>
            {% endif %}
            <span class="field-desc">Thư mục chứa dữ liệu crawl và glossary.</span>
        </label>
        <label> epub_path
            <input type="text" name="epub_path" value="{{ cfg.output.epub_path }}" placeholder="tự sinh từ slug"
                class="{% if not is_default(cfg.output.epub_path, 'output', 'epub_path') %}overridden{% endif %}">
            {% if is_default(cfg.output.epub_path, 'output', 'epub_path') %}
            <span class="default-hint">Mặc định: tự sinh</span>
            {% endif %}
            <span class="field-desc">Đường dẫn file EPUB. Để trống = tự sinh.</span>
        </label>
    </div>
</details>

<details class="settings-group" open>
    <summary>Hiệu suất</summary>
    <div class="settings-grid cols-2">
        <label> crawl.max_workers
            <input type="number" name="crawl_max_workers" value="{{ cfg.crawl.max_workers }}" min="1" max="20"
                class="{% if not is_default(cfg.crawl.max_workers, 'crawl', 'max_workers') %}overridden{% endif %}">
            {% if is_default(cfg.crawl.max_workers, 'crawl', 'max_workers') %}
            <span class="default-hint">Mặc định: 1</span>
            {% endif %}
            <span class="field-desc">Số luồng crawl song song.</span>
        </label>
        <label> translate.max_workers
            <input type="number" name="translate_max_workers" value="{{ cfg.translate.max_workers }}" min="1" max="20"
                class="{% if not is_default(cfg.translate.max_workers, 'translate', 'max_workers') %}overridden{% endif %}">
            {% if is_default(cfg.translate.max_workers, 'translate', 'max_workers') %}
            <span class="default-hint">Mặc định: 1</span>
            {% endif %}
            <span class="field-desc">Số luồng dịch song song.</span>
        </label>
    </div>
</details>

<div class="form-actions">
    <button type="button" class="btn-raw" onclick="toggleRawYaml('raw-output')">YAML</button>
</div>

<div id="raw-output" class="raw-yaml" hidden>
<pre><code>output:
  data_dir: {{ cfg.output.data_dir }}
  epub_path: {{ cfg.output.epub_path }}</code></pre>
</div>

</form>
