biquge:
  engine: scrapling
  url: https://www.biquge.co/
  domains: biquge,biqu,bqg,biqudu,biqun,xbiqug,biquwo,biqooge,paoshu8,ddxs,b520
  chapter_link_pattern: /\w+/\d+\.html$
  content_selector: '#content'
  toc_selector: '#list'
  chapter_title_selector: .bookname h1
  title_selector: '#info h1'
  author_selector: ''
  desc_selector: '#intro'
  cover_selector: '#fmimg img'
  encoding: ''
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36
  headless: true
  magic: true
  js_code: ''
  delay_seconds: 1.0
  next_page_selector: ''
  next_page_url_pattern: ''
  max_pages_per_chapter: 10
  scrapling_mode: stealthy
  solve_cloudflare: false
  network_idle: true
  impersonate: ''
  concurrency_cap: 0
  strip_patterns:
    - '^记住.*网址'
    - '^请收藏'
    - '^上一章'
    - '^下一章'
    - '.*百度搜索.*'
    - '.*使用百度.*'
    - '.*记住流蓝.*'
