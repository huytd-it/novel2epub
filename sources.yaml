# ============================================================
# Source presets — cấu hình crawl đặc thù theo từng website.
#
# Cách dùng:
#   1. Đặt tên preset vào cấu hình ebook:
#        crawl:
#          source: shuhaige     # → load các field từ sources.yaml
#          toc_url: "https://www.shuhaige.net/372421/"
#          # Các field khác nếu muốn ghi đè
#   2. Hoặc để hệ thống tự dò preset theo domain của toc_url
#      (so khớp trường `domains`; pattern dài hơn được ưu tiên).
#
# Field mỗi preset (xem novel2epub/sources.py:SourcePreset):
#   name / url / domains       — metadata + dò preset theo domain
#   engine                     — http (requests+BS4, free) | crawl4ai (trình duyệt/JS)
#   toc_selector               — vùng chứa link chương ở trang mục lục
#   content_selector           — vùng nội dung 1 chương
#   chapter_title_selector     — tiêu đề chương
#   title/author/desc/cover_selector — metadata truyện (để trống = dùng og:meta)
#   chapter_link_pattern       — regex lọc URL chương trong toc_selector
#   encoding                   — bảng mã (gbk/gb2312/utf-8); để trống = tự đoán
#   next_page_selector / next_page_url_pattern / max_pages_per_chapter — chương nhiều trang
#   headless / magic / js_code — chỉ dùng cho engine crawl4ai
#   delay_seconds              — nghỉ giữa mỗi request (lịch sự + tránh chặn)
#
# Lưu ý độ tin cậy:
#   ✔ shuhaige đã được kiểm chứng cấu trúc trực tiếp (template 笔趣阁 chuẩn).
#   ~ Các preset http khác dùng selector canonical của họ 笔趣阁 — đúng với
#     phần lớn clone, nhưng nên chạy preset-builder/preview để xác nhận từng site.
#   ~ Preset crawl4ai để trống selector và dựa vào markdown + magic mode; phù hợp
#     site JS-render / có chặn bot, nhưng chậm hơn và cần Playwright.
# ============================================================
sources:

  # =====================================================================
  # SITE FAMILY: 笔趣阁 / biquge  (HTML tĩnh — engine http, free, nhanh)
  # ---------------------------------------------------------------------
  # Hàng trăm site clone cùng một mã nguồn PHP. Cấu trúc chung:
  #   - Mục lục:   #list dd a            (toàn bộ link trong #list là chương)
  #   - Nội dung:  #content              (đôi khi #chaptercontent / #booktext)
  #   - Tiêu đề:   .bookname h1
  #   - Metadata:  thẻ og:title / og:novel:author / og:image (fallback #info, #intro)
  # =====================================================================

  # ---- Generic 笔趣阁 (dùng cho mọi clone chưa có preset riêng) ----
  biquge:
    name: 笔趣阁 (generic biquge clone)
    url: "https://www.biquge.co/"
    domains: "biquge,biqu,bqg,biqudu,biqun,xbiqug,biquwo,biqooge,paoshu8,ddxs,b520"
    engine: http
    toc_selector: "#list"
    content_selector: "#content"
    chapter_title_selector: ".bookname h1"
    title_selector: "#info h1"
    desc_selector: "#intro"
    cover_selector: "#fmimg img"
    chapter_link_pattern: '/\w+/\d+\.html$'
    delay_seconds: 1.0

  # ---- 书海阁 shuhaige.net  (✔ kiểm chứng trực tiếp) ----
  # Chương dài bị tách thành nhiều trang con (xxx_2.html); a#pager_next trỏ
  # sang trang kế HOẶC chương kế — crawler tự dừng khi vượt ranh giới chương.
  shuhaige:
    name: 书海阁 (shuhaige.net)
    url: "https://www.shuhaige.net/"
    domains: "shuhaige.net"
    engine: http
    toc_selector: "#list"
    content_selector: "#content"
    chapter_title_selector: ".bookname h1"
    title_selector: "#info h1"
    desc_selector: "#intro"
    cover_selector: "#fmimg img"
    chapter_link_pattern: '/\w+/\d+\.html$'
    next_page_selector: "a#pager_next"
    max_pages_per_chapter: 10
    delay_seconds: 1.0

  # ---- 笔趣阁 bqg128.com ----
  bqg128:
    name: 笔趣阁 (bqg128.com)
    url: "https://www.bqg128.com/"
    domains: "bqg128.com"
    engine: http
    toc_selector: "#list"
    content_selector: "#content"
    chapter_title_selector: ".bookname h1"
    title_selector: "#info h1"
    desc_selector: "#intro"
    cover_selector: "#fmimg img"
    chapter_link_pattern: '/\w+/\d+\.html$'
    delay_seconds: 1.0

  # ---- 新笔趣阁 xbiqugu.la (xbiquge.la redirect tới đây) ----
  # encoding gbk theo bản gốc xbiquge.
  xbiquge:
    name: 新笔趣阁 (xbiqugu.la)
    url: "http://www.xbiqugu.la/"
    domains: "xbiqugu.la,xbiquge.la,xbiquge.so"
    engine: http
    toc_selector: "#list"
    content_selector: "#content"
    chapter_title_selector: ".bookname h1"
    title_selector: "#info h1"
    desc_selector: "#intro"
    cover_selector: "#fmimg img"
    chapter_link_pattern: '/\w+/\d+\.html$'
    encoding: gbk
    delay_seconds: 1.0

  # =====================================================================
  # SITE TĨNH KHÁC (engine http)
  # =====================================================================

  # ---- 爱下电子书 aixdzs ----
  # HTML tĩnh, sạch. Nội dung chapter trong .content, mục lục trong #i-chapter.
  aixdzs:
    name: 爱下电子书 (aixdzs)
    url: "https://www.aixdzs.com/"
    domains: "aixdzs.com,aixdzs.org"
    engine: http
    toc_selector: "#i-chapter"
    content_selector: ".content"
    encoding: utf-8
    delay_seconds: 1.0

  # =====================================================================
  # SITE JS-RENDER / CHẶN BOT  (engine crawl4ai — cần Playwright)
  # ---------------------------------------------------------------------
  # Để trống toc/content selector: crawl4ai tự bóc link nội bộ + markdown,
  # magic mode vượt qua phần lớn lớp chống bot. Nếu site có vùng nội dung
  # ổn định, điền content_selector để cắt bớt nhiễu (header/quảng cáo).
  # =====================================================================

  # ---- 69书吧 69shuba (403 với http → cần trình duyệt) ----
  69shuba:
    name: 69书吧 (69shuba)
    url: "https://www.69shuba.com/"
    domains: "69shuba.com,69shu.com,69yuedu.net"
    engine: crawl4ai
    content_selector: ".txtnav"
    chapter_link_pattern: '/txt/\d+/\d+'
    headless: true
    magic: true
    delay_seconds: 1.5

  # ---- 笔趣读 biqudu.net (Cloudflare/403 → crawl4ai) ----
  biqudu:
    name: 笔趣读 (biqudu.net)
    url: "https://www.biqudu.net/"
    domains: "biqudu.net"
    engine: crawl4ai
    content_selector: "#content"
    headless: true
    magic: true
    delay_seconds: 1.5

  # ---- 起点中文网 qidian ----
  # JS nặng. Bản free chỉ vài chương đầu; VIP cần đăng nhập/token (không hỗ trợ).
  qidian:
    name: 起点中文网 (qidian)
    url: "https://www.qidian.com/"
    domains: "qidian.com"
    engine: crawl4ai
    content_selector: ".read-content"
    headless: true
    magic: true
    delay_seconds: 2.0

  # ---- 晋江文学城 jjwxc (nội dung mã hoá/JS, VIP cần đăng nhập) ----
  jjwxc:
    name: 晋江文学城 (jjwxc.net)
    url: "https://www.jjwxc.net/"
    domains: "jjwxc.net"
    engine: crawl4ai
    encoding: gb2312
    headless: true
    magic: true
    delay_seconds: 2.0

  # ---- 刺猬猫 ciweimao (SPA, JS-render) ----
  ciweimao:
    name: 刺猬猫 (ciweimao.com)
    url: "https://www.ciweimao.com/"
    domains: "ciweimao.com"
    engine: crawl4ai
    headless: true
    magic: true
    delay_seconds: 2.0

  # ---- 和图书 hetushu (403 → crawl4ai) ----
  hetushu:
    name: 和图书 (hetushu.com)
    url: "https://www.hetushu.com/"
    domains: "hetushu.com,hetubook.com"
    engine: crawl4ai
    content_selector: "#content"
    headless: true
    magic: true
    delay_seconds: 1.5

  # ---- 思兔 sto9 (JS popup) ----
  sto9:
    name: 思兔 (sto9.com)
    url: "https://www.sto9.com/"
    domains: "sto9.com"
    engine: crawl4ai
    toc_selector: "#allchapter"
    headless: true
    magic: true
    delay_seconds: 1.0

  # ---- 书旗小说 shuqi (SPA React) ----
  shuqi:
    name: 书旗小说 (shuqi.com)
    url: "https://www.shuqi.com/"
    domains: "shuqi.com"
    engine: crawl4ai
    headless: true
    magic: true
    delay_seconds: 1.5

  # ---- QQ阅读 (trang mobile, JS-render) ----
  qqread:
    name: QQ阅读 (read.qq.com)
    url: "https://book.qq.com/"
    domains: "read.qq.com,book.qq.com"
    engine: crawl4ai
    headless: true
    magic: true
    delay_seconds: 1.5

  # =====================================================================
  # METADATA-ONLY (không phải nguồn chương)
  # =====================================================================

  # ---- 百度百科 — chỉ lấy metadata, không crawl nội dung chương ----
  baike:
    name: 百度百科 (metadata only)
    url: "https://baike.baidu.com/"
    domains: "baike.baidu.com"
    engine: crawl4ai
    content_selector: ".para"
    title_selector: ".lemmaTitle_list h1"
    desc_selector: ".para"
    cover_selector: ".summary-pic img"
    headless: true
    magic: true
    delay_seconds: 0.5
