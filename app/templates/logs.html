{% extends "base.html" %}
{% block title %}Nhật ký — novel2epub{% endblock %}
{% block content %}
<div class="flex items-baseline justify-between gap-4 mb-1">
    <h2 class="m-0 text-xl font-semibold">Nhật ký job</h2>
</div>
<p class="text-muted-light dark:text-muted-dark text-sm mb-3">Nhật ký từ các job gần đây. Job đang chạy tự động làm mới mỗi 2s.</p>

<div id="logs-region">
<h3 class="text-base font-semibold mt-4 mb-2">Đang chạy</h3>
<div id="logs-running"></div>

<h3 class="text-base font-semibold mt-4 mb-2">Gần đây</h3>
<div class="flex flex-wrap gap-4 items-end my-3">
    <label class="flex flex-col gap-1 text-sm">Tìm kiếm
        <input type="search" id="log-search" placeholder="Lọc nhật ký..." oninput="filterLogs()" class="rounded-md border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-link-light/40">
    </label>
    <label class="flex flex-col gap-1 text-sm">Step
        <select id="log-filter-step" onchange="filterLogs()" class="rounded-md border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-link-light/40">
            <option value="">Tất cả</option>
            {% for s in steps %}
            <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
        </select>
    </label>
    <label class="flex flex-col gap-1 text-sm">Trạng thái
        <select id="log-filter-state" onchange="filterLogs()" class="rounded-md border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-link-light/40">
            <option value="">Tất cả</option>
            <option value="running">Đang chạy</option>
            <option value="done">Hoàn tất</option>
            <option value="failed">Lỗi</option>
            <option value="cancelled">Đã hủy</option>
        </select>
    </label>
</div>
<div id="logs-recent"></div>
</div>

<template id="log-entry-tpl">
    <details class="log-entry border border-border-light dark:border-border-dark rounded-lg my-2 bg-surface-alt-light dark:bg-surface-alt-dark" data-step="" data-state="">
        <summary class="flex justify-between items-center px-3 py-2 cursor-pointer">
            <span class="flex items-center gap-2 flex-wrap">
                <span class="badge log-state-badge inline-flex items-center px-2 py-0.5 text-xs rounded-full bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark">state</span>
                <strong class="log-step-label">step</strong>
                <span class="muted log-ebook-label text-muted-light dark:text-muted-dark text-sm">ebook</span>
                <span class="muted log-time-label text-muted-light dark:text-muted-dark text-sm">time</span>
            </span>
            <span class="log-summary-right text-sm text-muted-light dark:text-muted-dark">
                <span class="log-line-count">0 dòng</span>
            </span>
        </summary>
        <div class="log-body px-3 pb-3">
            <pre class="log-content bg-zinc-950 text-zinc-100 font-mono text-xs rounded-card p-3 overflow-auto m-0 max-h-96 whitespace-pre-wrap"></pre>
        </div>
    </details>
</template>
{% endblock %}

{% block scripts %}
<script>
const tpl = document.getElementById("log-entry-tpl");
let _prevSnapshot = "";
let _pollTimer = null;

function fmtTime(ts) {
    if (!ts) return "—";
    return new Date(ts * 1000).toLocaleString();
}

function renderLogEntry(j) {
    const el = tpl.content.cloneNode(true);
    const details = el.querySelector(".log-entry");
    details.dataset.step = j.step || "";
    details.dataset.state = j.state || "";
    details.dataset.ebook = j.ebook || "";

    el.querySelector(".log-state-badge").textContent = j.state;
    el.querySelector(".log-step-label").textContent = j.label || j.step;
    const ebookEl = el.querySelector(".log-ebook-label");
    ebookEl.textContent = j.ebook ? `(${j.ebook})` : "";
    el.querySelector(".log-time-label").textContent = fmtTime(j.started_at || j.enqueued_at);

    const pre = el.querySelector(".log-content");
    const lines = j.log || [];
    pre.textContent = lines.join("\n") || "(không có nhật ký)";
    el.querySelector(".log-line-count").textContent = lines.length + " dòng";

    return details;
}

function filterLogs() {
    const search = (document.getElementById("log-search").value || "").toLowerCase();
    const step = document.getElementById("log-filter-step").value;
    const state = document.getElementById("log-filter-state").value;

    document.querySelectorAll(".log-entry").forEach(el => {
        const text = el.textContent.toLowerCase();
        const matchesSearch = !search || text.includes(search);
        const matchesStep = !step || el.dataset.step === step;
        const matchesState = !state || el.dataset.state === state;
        el.style.display = matchesSearch && matchesStep && matchesState ? "" : "none";
    });
}

function snapshotKey(data) {
    return JSON.stringify({ r: data.running.map(j => j.id + ":" + (j.log||[]).length), h: data.recent.map(j => j.id) });
}

function rebuild(data) {
    const runningEl = document.getElementById("logs-running");
    if (data.running.length) {
        runningEl.innerHTML = "";
        data.running.forEach(j => runningEl.appendChild(renderLogEntry(j)));
    } else {
        runningEl.innerHTML = '<p class="text-muted-light dark:text-muted-dark text-sm">Không có job đang chạy.</p>';
    }
    const recentEl = document.getElementById("logs-recent");
    recentEl.innerHTML = "";
    if (data.recent.length) {
        data.recent.forEach(j => recentEl.appendChild(renderLogEntry(j)));
    } else {
        recentEl.innerHTML = '<p class="text-muted-light dark:text-muted-dark text-sm">Chưa có lịch sử.</p>';
    }
    filterLogs();
}

async function renderLogs() {
    try {
        const res = await fetch("/api/logs");
        if (!res.ok) return;
        const data = await res.json();
        const key = snapshotKey(data);
        if (key !== _prevSnapshot) {
            _prevSnapshot = key;
            rebuild(data);
        }
        if (!data.running.length) {
            if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
        } else if (!_pollTimer) {
            _pollTimer = setInterval(renderLogs, 2000);
        }
    } catch (e) {
        console.error("Poll logs error:", e);
    }
}

renderLogs();
</script>
{% endblock %}
