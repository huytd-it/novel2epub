# ============================================================
# novel2epub — file cấu hình GỘP duy nhất
# Copy thành `novel2epub.yaml` rồi chỉnh sửa.
#
# 3 khối:
#   defaults: phần DÙNG CHUNG cho mọi ebook (prompt dịch, style, output...).
#   sources : preset theo website (selector/pattern) để tái dùng khi thêm ebook.
#   ebooks  : mỗi ebook CHỈ khai phần KHÁC với defaults (deep-merge lên defaults).
#
# Config hiệu lực của 1 ebook = deep_merge(defaults, ebooks[<slug>]).
# Chọn ebook khi chạy: `python -m novel2epub -e <slug> <command>`.
# Đổi file qua ENV: NOVEL2EPUB_FILE=/đường/dẫn/khác.yaml
# ============================================================

defaults:
  crawl:
    # engine: http (requests+BS4, free) | crawl4ai (browser thật, render JS) | scrapling (stealth, anti-bot)
    engine: http
    delay_seconds: 1.0
    content_selector: ""        # CSS vùng nội dung chương, vd "#content"
    toc_selector: ""            # CSS vùng danh sách link chương (chỉ engine http)
    chapter_title_selector: ""
    encoding: ""                # "" = tự đoán; site Trung hay dùng "gbk"
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
    headless: true              # chỉ crawl4ai
    magic: true                 # chỉ crawl4ai — vượt bot detection
    next_page_selector: ""      # phân trang trong 1 chương (vd "a#pager_next")
    max_pages_per_chapter: 10
    max_chapters: 0             # 0 = tải tất cả
    # Thử lại + lùi dần khi bị HTTP 429 (Too Many Requests) / chặn anti-bot.
    # Chỉ kích hoạt khi chương tải LỖI; tôn trọng header Retry-After nếu server gửi.
    # Bị 429 nhiều? Tăng delay_seconds (giãn cách đều), giảm max_workers, tăng retry dưới đây.
    retry:
      attempts: 3               # số lần thử lại sau lần đầu thất bại (0 = tắt)
      delay_seconds: 5.0        # chờ ban đầu trước lần thử lại đầu tiên
      backoff: 2.0              # nhân thời gian chờ mỗi lần (5s -> 10s -> 20s ...)
      max_delay_seconds: 120.0  # trần thời gian chờ một lần
      respect_retry_after: true # ưu tiên header Retry-After của server nếu có

  translate:
    # type: moxhimt (model NMT cục bộ, offline, miễn phí — mặc định)
    #     | openai (AI OpenAI-Compatible: OpenAI, OpenRouter, Ollama, LM Studio, vLLM...)
    #     | google (deep-translator)
    #     | none (giữ gốc)
    type: moxhimt
    style:
      tone: "mượt, tự nhiên, có chất cổ trang"
      pronoun_policy: contextual
      title_mode: creative
      han_viet_level: balanced
      keep_paragraphs: true
    retry: { attempts: 1, delay_seconds: 0.0 }
    chunk: { max_chars: 1500, overlap_paragraphs: 0 }
    delay_seconds: 0.5
    openai:
      base_url: "https://api.openai.com/v1"  # vd "https://openrouter.ai/api/v1", "http://localhost:11434/v1" (Ollama)
      api_key: ""                # token Bearer — để trống nếu provider local không yêu cầu
      model: "gpt-4o-mini"
      timeout_seconds: 300
      temperature: 0.7
      # Bỏ trống prompt_template/title_prompt_template để dùng prompt mặc định
      # tích hợp sẵn trong code (novel2epub/config.py: DEFAULT_PROMPT/TITLE_PROMPT).
      # Chỉ khai ở đây hoặc trong từng ebook khi muốn ghi đè.
    # Backend dịch cục bộ MoxhiMT (chỉ dùng khi type: moxhimt). Chạy offline,
    # miễn phí, tối ưu cho tiểu thuyết mạng/tiên hiệp. Model tự tải từ Hugging
    # Face Hub lần đầu. Cần: pip install ctranslate2 sentencepiece huggingface_hub
    # MẶC ĐỊNH bên dưới đã là cấu hình chất lượng cao nhất — không cần chỉnh gì.
    moxhimt:
      # model_id cùng kiến trúc SentencePiece + CTranslate2 Marian (đổi 1 dòng):
      #   DanVP/MoxhiMT-60          (mặc định — bản 60, chất lượng cao nhất)
      #   DanVP/MoxhiMT-30          (nhẹ/nhanh hơn)
      #   DanVP/MoxhiMT-30-web
      #   ngocdang83/HachimiMT-60-zh-vi
      #   ngocdang83/HachimiMT-30-zh-vi
      # KHÔNG hỗ trợ: hy-mt-xianxia-lora-vi (LoRA), moxhimt-pronoun-clf (classifier).
      model_id: "DanVP/MoxhiMT-60"
      beam_size: 4              # rộng hơn = tốt hơn (chậm hơn)
      max_length: 512           # trần token/lượt dịch của model
      chunk_mode: paragraph     # paragraph (cẩn thận nhất) | sentence (nhanh hơn)
      cache_dir: ""             # trống = cache mặc định của huggingface_hub
      device: cpu

  output:
    data_dir: data              # thư mục cache raw + bản dịch

