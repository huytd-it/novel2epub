# ============================================================
# novel2epub — file cấu hình GỘP duy nhất
# Copy thành `novel2epub.yaml` rồi chỉnh sửa.
#
# 2 khối:
#   defaults: phần DÙNG CHUNG cho mọi ebook (prompt dịch, style, output...).
#   ebooks  : mỗi ebook CHỈ khai phần KHÁC với defaults (deep-merge lên defaults).
#
# Config hiệu lực của 1 ebook = deep_merge(defaults, ebooks[<slug>]).
# Chọn ebook khi chạy: `python -m novel2epub -e <slug> <command>`.
# Đổi file qua ENV: NOVEL2EPUB_FILE=/đường/dẫn/khác.yaml
# ============================================================

defaults:
  crawl:
    # Scrapling là engine duy nhất. 3 mode: fetcher (mặc định), stealthy, dynamic.
    engine: scrapling
    scrapling:
      mode: fetcher
      solve_cloudflare: false   # chỉ dùng cho mode stealthy
      network_idle: true        # stealthy/dynamic
      impersonate: ""           # TLS fingerprint cho fetcher (vd "chrome")
    delay_seconds: 1.0
    content_selector: ""        # CSS vùng nội dung chương, vd "#content"
    headless: true              # stealthy/dynamic mode
    next_page_selector: ""      # phân trang trong 1 chương (vd "a#pager_next")
    max_pages_per_chapter: 10
    max_chapters: 0             # 0 = tải tất cả
    retry:
      attempts: 3
      delay_seconds: 5.0
      backoff: 2.0
      max_delay_seconds: 120.0
      respect_retry_after: true

  translate:
    type: hachimimt            # hachimimt | openai | google | none
    style:
      tone: "mượt, tự nhiên, có chất cổ trang"
      pronoun_policy: contextual
      title_mode: creative
      han_viet_level: balanced
      keep_paragraphs: true
    retry: { attempts: 1, delay_seconds: 0.0 }
    chunk: { max_chars: 1500, overlap_paragraphs: 0 }
    delay_seconds: 0.5
    openai:
      base_url: "https://api.openai.com/v1"
      api_key: ""
      model: "gpt-4o-mini"
      timeout_seconds: 300
      temperature: 0.7
    hachimimt:
      model_key: "HachimiMT-60"
      backend: "ctranslate2"
      beam_size: 2
      chunk_mode: "sentence"

  output:
    data_dir: data

ebooks:
  vi-du-truyen:
    name: "Tên hiển thị ở dashboard"
    novel:
      title: "Tên truyện (tiếng Việt)"
      author: "Tác giả"
      language: vi
      slug: vi-du-truyen
    crawl:
      toc_url: "https://www.shuhaige.net/17619/"
      chapter_link_pattern: '/17619/\d+\.html'
      content_selector: '#content'
      scrapling:
        mode: fetcher
        impersonate: chrome
