<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}novel2epub{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        // Pre-paint: áp theme trước khi render để tránh nháy sáng/tối (FOUC).
        (function () {
            var saved = localStorage.getItem("n2e-theme");
            var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="shell-header">
        <h1><a href="/">novel2epub</a></h1>
        <nav>
            <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">Thư viện</a>
            <a href="/sources" class="{{ 'active' if request.url.path.startswith('/sources') or request.url.path.startswith('/preset-builder') else '' }}">Nguồn</a>
            <a href="/storage" class="{{ 'active' if request.url.path.startswith('/storage') else '' }}">Lưu trữ</a>
            <a href="/automation" class="{{ 'active' if request.url.path.startswith('/automation') else '' }}">Tự động hóa</a>
            <a href="/logs" class="{{ 'active' if request.url.path.startswith('/logs') else '' }}">Nhật ký</a>
        </nav>
        <div class="shell-header-right">
            <a href="/queue" id="queue-indicator" class="queue-indicator" title="Hàng đợi job">⏳ <span id="queue-count">0</span></a>
            <button type="button" id="theme-toggle" class="btn-refresh" title="Đổi giao diện sáng/tối">🌓</button>
        </div>
    </header>
    <main class="{% block mainclass %}fluid{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <div id="toast-region" class="toast-region" aria-live="polite"></div>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
